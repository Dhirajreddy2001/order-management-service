services:
  kafka:
    image: confluentinc/cp-kafka:latest
    hostname: kafka
    container_name: kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT}
      KAFKA_HEAP_OPTS: -Xms256m -Xmx256m
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - microservices

  order-api:
    image: ${ECR_REGISTRY}/order-api:${IMAGE_TAG:-latest}
    container_name: order-api
    ports:
      - "${ORDER_API_PORT}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${ORDER_API_PROFILE}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_DATASOURCE_URL: ${ORDER_API_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${ORDER_API_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_API_DB_PASSWORD}
    depends_on:
      - kafka
    networks:
      - microservices

  inventory-service:
    image: ${ECR_REGISTRY}/inventory-service:${IMAGE_TAG:-latest}
    container_name: inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT}:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_PROFILES_ACTIVE: ${INVENTORY_SERVICE_PROFILE}
      SERVER_PORT: ${INVENTORY_SERVICE_PORT}
      SPRING_DATASOURCE_URL: ${INVENTORY_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${INVENTORY_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${INVENTORY_DB_PASSWORD}
    depends_on:
      - kafka
    networks:
      - microservices

  notification-service:
    image: ${ECR_REGISTRY}/notification-service:${IMAGE_TAG:-latest}
    container_name: notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_PROFILES_ACTIVE: ${NOTIFICATION_SERVICE_PROFILE}
      SERVER_PORT: ${NOTIFICATION_SERVICE_PORT}
    depends_on:
      - kafka
    networks:
      - microservices

  invoice-woker:
    image: ${ECR_REGISTRY}/invoice-woker:${IMAGE_TAG:-latest}
    container_name: invoice-woker
    ports:
      - "${INVOICE_WORKER_PORT}:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${INVOICE_WORKER_PROFILE}
      SPRING_CLOUD_AWS_REGION_STATIC: ${AWS_REGION}
    networks:
      - microservices

networks:
  microservices:
    driver: bridge
